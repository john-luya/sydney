        const Sparkles = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>);

        );

        const App = () => {
            return (
                <div className="min-h-screen selection:bg-blue-100">
                    
                    {/* Header: 调整标题比例为更优雅的 6xl */}
                    <header className="relative h-[85vh] bg-slate-900 flex items-end overflow-hidden">
                        <img 
                            src="https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?auto=format&fit=crop&q=80&w=2070" 
                            className="absolute inset-0 w-full h-full object-cover opacity-60 scale-105" 
                            alt="Sydney Harbor" 
                        />
                        <div className="absolute inset-0 hero-gradient"></div>
                        <div className="relative z-10 p-12 max-w-4xl mx-auto w-full text-white pb-32">
                            <p className="text-[10px] tracking-[0.5em] uppercase opacity-40 mb-8 flex items-center gap-3 animate-fade-in">
                                <Anchor size={12}/> Sydney · Memory · 2023-2025
                            </p>
                            <h1 className="text-4xl md:text-6xl font-extralight tracking-tight leading-tight animate-fade-in serif-font">
                                在冷白灯光下，<br/>偷听南半球的潮汐
                            </h1>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-6 py-24 space-y-24">
                        
                        {/* 卷首语 */}
                        <section className="relative py-12 text-center">
                            <Quote className="absolute top-0 left-1/2 -translate-x-1/2" />
                            <div className="max-w-xl mx-auto text-xl font-light text-slate-400 italic serif-font leading-relaxed">
                                “有些城市是用来路过的，而有些光阴是用来呼吸的。当二十四岁的身体被折叠进格子间的冷白灯光里，只有心跳还记得，南半球那场带着盐味、永不落幕的风。”
                            </div>
                        </section>

                        {/* 手记 1：笔者自序 (杏色底色) */}
                        <section className="bg-[#fefaf6] border border-orange-100/50 p-10 md:p-12 rounded-[2.5rem] shadow-xl shadow-orange-900/5 relative overflow-hidden group animate-fade-in">
                            <div className="absolute -top-6 -right-6 opacity-[0.03] group-hover:scale-110 transition-transform duration-700">
                                <Wind size={200} />
                            </div>
                            <div className="relative z-10">
                                <h2 className="text-[10px] tracking-[0.4em] uppercase text-orange-800/60 font-bold mb-8 flex items-center gap-2">
                                    <Wind size={14} className="text-orange-400" /> Preface · 笔者手记
                                </h2>
                                <div className="text-lg leading-loose text-slate-700 serif-font italic">
                                    写下这些文字时，我正坐在格子间的冷白灯板下。
                                    <br/><br/>
                                    回国后的日子，我常觉得自己像是在两个世界间泅泳：一边是悉尼那场怎么也吹不散的海风，一边是眼前密不透风的规矩。这篇文章，是我在秩序的缝隙里，给那个曾经自由呼吸过的自己，找一个出口。
                                </div>
                            </div>
                        </section>

                        {/* 正文第一部分：职场与错位感 */}
                        <article className="text-lg text-slate-800 space-y-12 serif-font px-2">
                            <p className="drop-cap">我是在一个再普通不过的工作日里，突然想起悉尼的。办公室的灯白得发冷，像把人的脸色也一并漂淡了。电脑屏幕持续发光，像一块永远不会熄灭的玻璃。键盘声、人声、走廊里不紧不慢的脚步声混在一起，成了一层粘稠的底噪，贴着你，甩不开。</p>
                            
                            <p>那一刻没有发生什么大事——没有训斥，没有失误，甚至称得上“还好”。可我的胸口还是被什么轻轻压了一下：不是痛，是闷。像你已经很努力在适应一种节奏，却仍然被它礼貌地推开，提醒你：你不属于这里，至少暂时不属于。</p>
                            
                            <p>从去年十二月中旬回国到现在，我很少有真正快乐的一天。元旦假期一结束，家里几乎是把我“送”进了职场。实习期听起来轻松，负担也不重，可越往里走，我越觉得难受。难受并不是事情有多难，而是那些无处不在的形式、流程、规矩——它们像透明的墙，你摸上去没有形状，却处处挡着你。</p>
                            
                            <p className="bg-blue-50/40 p-10 rounded-[2.5rem] italic text-slate-600 border-l border-blue-100 shadow-sm leading-relaxed">明明是一件很简单的事，却要先穿过一套仪式：确认、审批、递交、复核、汇报。你不得不把本来能直线到达的结果绕成一圈又一圈，像是在向某种看不见的权威证明：你配得上被允许完成它。</p>
                            
                            <p>我受不了这种强制的枷锁。每当那种无形的压迫感落下来，我就会下意识地想起悉尼——想起那两年看似“虚度”，却在我二十四年人生里最值得怀念的光阴。</p>
                        </article>

                        {/* 手记 2：关于“呼吸” (波光蓝) */}
                        <section className="bg-[#f0f9ff] border border-blue-100/50 p-10 md:p-12 rounded-[2.5rem] shadow-xl shadow-blue-900/5 relative overflow-hidden group animate-fade-in">
                            <div className="absolute -top-10 -right-10 opacity-[0.05] group-hover:rotate-12 transition-transform duration-1000">
                                <Sparkles size={220} />
                            </div>
                            <div className="relative z-10">
                                <h2 className="text-[10px] tracking-[0.4em] uppercase text-blue-600/60 font-bold mb-8 flex items-center gap-2">
                                    <Sparkles size={14} className="text-blue-400" /> Reflection · 呼吸的状态
                                </h2>
                                <div className="text-lg leading-loose text-slate-700 serif-font italic">
                                    在悉尼时，我并没有把那种状态叫作“幸福”，我只是觉得日子是顺的。
                                    <br/><br/>
                                    呼吸是顺的，心是松的。你不必时时刻刻解释自己在做什么、没做什么。那时候我才明白，自由不是指“无所事事”，而是指“不必证明”。
                                </div>
                            </div>
                        </section>

                        {/* 正文第二部分：还原悉尼生活的广度 */}
                        <article className="text-lg text-slate-800 space-y-12 serif-font px-2">
                            <p>悉尼的天空总是开阔的。那是一种你不必抬头确认也能感到的开阔：云在很高的地方慢慢移动，光线不急不躁地铺在街道上；风从海那边来，带着一点盐，一点凉。很多傍晚我从学校出来，沿着街道往回走，电车从身旁滑过去，街角咖啡馆的灯透过玻璃亮着。城市不吵，人也不吵。</p>
                            
                            <p>你不必时时刻刻解释自己在做什么、没做什么；也不必把每一个选择都包装成“正确的决定”。时间更像是属于你的：你可以慢一点，允许自己晚起，允许自己走神，允许自己把一个下午浪费在海边的台阶上，只是看浪一层层推过来。你不必急着成为一个“有用的人”。你只是一个活着的人。</p>
                            
                            <h3 className="text-[10px] tracking-[0.4em] text-slate-300 uppercase mb-12 border-b border-slate-100 pb-4">Chapter II · 栖居之底气</h3>
                            
                            <p>而在那段自由里，有一件事对我来说格外重要：住处。我一直很清楚自己愿意把钱花在哪里。我宁愿把一个月生活费的大头花在“住”上——哪怕在很多人看来那是一种不必要的“浪费”。因为住处不是标签，它更像身体的第二层皮肤：你每天回到那里，推开门的瞬间，空气是否干净、光线是否温柔、隔音是否足够让你安静地把自己放下——这些细小到无法量化的东西，会在你情绪低落时托住你。</p>
                            
                            <p>这差别很难用参数讲清楚。你没法拆成一条条对比：贵在哪里一厘米的空间、一分贝的安静、一盏灯的色温。它更像一种长期的、细小的、却真实存在的照顾：你不必额外耗费力气去忍受原本可以不忍受的东西，于是你能把力气留给生活本身。</p>
                        </article>

                        {/* 正文第三部分：悉尼租房曲线还原 */}
                        <article className="text-lg text-slate-800 space-y-12 serif-font px-2">
                            <p>我在悉尼的租房经历像一条慢慢上升的曲线，也像一种对自己越来越诚实的过程。2023年10月18日，我抵达悉尼。那时候什么都急：急着落脚，急着不让自己看起来太狼狈。于是我提前不久就在社交平台找了一间短租：三房两卫，我住次卧，需要和另一个次卧的室友共用一个卫生间。那几乎是我最烦的一点——生活边界被迫重叠的感觉，会在每天的细节里提醒你：你只是暂时借住，你还没真正安顿下来。</p>
                            
                            <p>可除了共用卫生间之外，那间房子又处处合我心意：位置、家具、光线、动线，甚至客厅里那种“刚好”的安静。刚到一座陌生城市时，人其实不需要太多。你只需要一个地方能放下行李箱，也能把心放下。短租意味着你很快就得做下一次选择。我退租前一个多月就开始找下家。那段时间像一场漫长的筛选：什么是你能将就的，什么是你不能的；什么是“看起来体面”，什么是“住起来舒服”；什么是你以为无所谓，但住过之后再也回不去的东西。</p>
                            
                            <p>后来我相中了市中心的一间公寓。它是那种你在来之前就听说过、也在心里偷偷喜欢过的地方。有人谈背景、投资、承建，我没有认真打听，因为我确实不在乎。我在乎的是：我站在那里时，心里会出现一种很直接的念头——我想住在这里。它的缺点也很直白：比很多选择贵出一截。可有些喜欢是压不住的。你明知道这会让你在开销上更谨慎一点，还是会在看完房的那一刻对自己说：就它吧。</p>
                        </article>

                        {/* 手记 3：关于底气 (月光灰/深色) */}
                        <section className="bg-slate-900 text-white p-12 md:p-16 rounded-[3.5rem] shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-10">
                                <Heart size={120} />
                            </div>
                            <div className="max-w-xl relative z-10">
                                <h2 className="text-[10px] tracking-[0.4em] uppercase text-blue-400 font-bold mb-8 flex items-center gap-2">
                                    <Heart size={14} /> Epiphany · 关于底气
                                </h2>
                                <div className="text-xl font-extralight leading-relaxed serif-font space-y-8 opacity-90">
                                    <p>在那一年的合租里，我慢慢变得很“安”。那不是轰轰烈烈的快乐，而是一种稳定的底气。门一关上，城市像被隔在玻璃之外。我想，人并不是需要多奢侈的生活，人只是需要一种不必警惕的放松。</p>
                                </div>
                            </div>
                        </section>

                        {/* 正文第四部分：香港的隐喻 */}
                        <article className="text-lg text-slate-800 space-y-12 serif-font px-2">
                            <p>后来室友准备换房，问我愿不愿意继续一起搬。新的公寓在海港附近，名字听起来就带着一种锋利的光。只看价格的时候，我确实愣了一下——那种“怎么会贵到这种程度”的震惊几乎是本能的。但当你真的走进去，你又不得不承认：它像一间被拉长到日常里的酒店。大堂的气味、公共空间的秩序感、健身房与泳池的质感，连安静都像被设计出来的。你不是突然变得虚荣。你只是突然明白：原来生活可以被照顾到这种程度。</p>
                            
                            <p>毕业之后飞往香港。住宿拆成两段。前三晚我住在廉价酒店，楼老，走廊昏，灯光像蒙着灰。电梯慢得像在叹气，房间里有一种说不出来的潮与旧。你会明显感觉到它只负责提供“过夜”这件事，不负责让你“生活”。后两晚我换到五星级酒店。那一晚的费用，足够让我在前一家住很久。入住那一刻，你不需要任何解释就能感受到差别：每一处触感的干净，连窗帘合上的声音都更轻，轻得像怕惊扰你。你会突然明白：住得好不是为了炫耀，而是一种被妥帖照顾的感觉——你不必费力，事情就能顺利地发生。</p>
                            
                            <p>可人生偏偏很会开玩笑。迪士尼那天走到腿软。然后甲沟炎复发了，痛得要命。最后两天，我几乎没有机会去享受五星级酒店的大多数配套：温泉、恒温泳池，这些本该用来“享受”的东西都在那里，可我只能拄着疼痛在房间和楼下之间做最短的往返。那几天让我清楚意识到：我们愿意在“住”上花钱，买的是一种可能性——一种让你更容易舒服、更容易恢复、更容易把自己安放好的可能性。但当身体不给面子的时候，再好的环境也只能把疼痛放得更安静一点，无法替你把疼痛取消。</p>
                        </article>

                        {/* 正文第五部分：回归的 Weird 感 */}
                        <article className="text-lg text-slate-800 space-y-12 serif-font px-2">
                            <p>真正回到熟悉的土地时，落地并不等于安稳。元旦假期一结束，我被催着去上班，那种压抑又回来了——比想象中更快、更密、更日常。你会在某个瞬间突然愣住：为什么要这样？为什么非要按这个形式？为什么要把简单的事做得这么复杂？答案往往不是逻辑，而是习惯。大家都习惯了，就成了规则；规则被重复得足够久，就变成了“你应该”。</p>
                            
                            <p>某些时刻，我脑子里会跳出一个词：weird。这是一种真实的错位感。像你刚从海风里走回来，身上还带着那边的空气，而这里的一切都在提醒你：你得快点换一种呼吸方式。</p>
                            
                            <p className="bg-white p-12 rounded-[2.5rem] shadow-sm border border-slate-50 italic text-slate-700 leading-relaxed">现在的生活像被放进一套结构分明的框架里：时间被切割得很整齐，情绪被挤压得很零碎。这种疲惫不猛烈，却很持久。我怀念的是一种状态——年轻、自由、选择很多、未来很宽。在悉尼的两年，从结果上看也许并不耀眼，但它真实得发亮。那两年，也许不是我人生最重要的阶段。但它很可能，是我最能呼吸的一段时间。</p>
                        </article>

                        {/* 结尾：海风的回响 - 太平洋蓝渐变 */}
                        <section className="relative py-12 group">
                            <div className="absolute inset-0 bg-gradient-to-tr from-blue-600/10 via-cyan-400/5 to-transparent rounded-[4rem] transition-transform duration-700"></div>
                            <div className="relative z-10 p-10 md:p-14 text-center space-y-12">
                                <div className="space-y-4">
                                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto shadow-xl mb-6 group-hover:scale-105 transition-transform">
                                        <Wind className="text-blue-500" />
                                    </div>
                                    <h3 className="text-3xl font-light text-slate-900 tracking-[0.3em] uppercase">海风的回响</h3>
                                </div>
                                
                                <div className="max-w-xl mx-auto text-xl leading-relaxed text-slate-600 serif-font italic text-left bg-white/80 p-12 rounded-[3rem] glass-card shadow-lg relative border-white/80">
                                    <Quote className="absolute -top-4 left-8 scale-110" />
                                    请记得，你曾经那样自然地呼吸过。此刻格子间的灯光虽冷，但灵魂里那场咸湿的海风，永远不会停。✨
                                </div>
                            </div>
                        </section>

                        {/* Footer */}
                        <footer className="pt-24 text-center opacity-20">

                            </p>

                    </main>

                    {/* 极简返回顶部 */}
                    <div className="fixed bottom-10 left-10">

                        >

                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
